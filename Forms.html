<body><h1>Head?</h1>
    <div id="dih">
      <form action="post" enctype="multipart/form-data"></form>  
    <label for="Name">Name:</label>
    <input type="text" placeholder="John Doe" required>
    <br>
    <label for="Phone#">Phone#</label>
    <input type="tel" name="Phone#" id="Phone#" placeholder="054-454-2436" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
    <br>
    <label for="Favnumber">Favnumber:</label>
    <input type="number" name="favnumber" id="number"  placeholder="7" required>
    <br>
    <label for="Email">Email:</label>
    <input type="email" name="email" id="email" placeholder="80085@gmail.com">
    <br>
    <label for="bday">bday:</label>
    <input type="date" name="bday" id="bday">
    <br>
    <label for="cut">Cut:</label>
    <select name="cut" id="cut">
        <option value="fade">fade</option>
        <option value="dreads">dreads</option>
        <option value="">bald</option>
        <option value="uncut">uncut</option>
    </select>
    <br>
    <label for="file">file:</label>
    <input type="file" name="file" id="file" accept="image/jpg image/png">
    <br>
    <input type="reset" >
    <br>
    <input type="submit" value="submit">
